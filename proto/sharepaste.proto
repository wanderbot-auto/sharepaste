syntax = "proto3";

package sharepaste.v1;

option go_package = "sharepaste/proto/sharepaste/v1;sharepastev1";

service DeviceService {
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc RenameDevice(RenameDeviceRequest) returns (RenameDeviceResponse);
  rpc RemoveDevice(RemoveDeviceRequest) returns (RemoveDeviceResponse);
  rpc RecoverGroup(RecoverGroupRequest) returns (RecoverGroupResponse);
}

service PairingService {
  rpc CreateBindCode(CreateBindCodeRequest) returns (CreateBindCodeResponse);
  rpc RequestBind(RequestBindRequest) returns (RequestBindResponse);
  rpc ConfirmBind(ConfirmBindRequest) returns (ConfirmBindResponse);
}

service PolicyService {
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);
  rpc UpdatePolicy(UpdatePolicyRequest) returns (UpdatePolicyResponse);
}

service SyncService {
  rpc OpenEventStream(stream EventStreamClientMessage) returns (stream EventStreamServerMessage);
  rpc PushClipboardItem(PushClipboardItemRequest) returns (PushClipboardItemResponse);
  rpc AckItem(AckItemRequest) returns (AckItemResponse);
  rpc FetchOffline(FetchOfflineRequest) returns (FetchOfflineResponse);
}

message Device {
  string device_id = 1;
  string group_id = 2;
  string pubkey = 3;
  string name = 4;
  string platform = 5;
  int64 last_seen_unix = 6;
  bool active = 7;
}

message Policy {
  bool allow_text = 1;
  bool allow_image = 2;
  bool allow_file = 3;
  int64 max_file_size_bytes = 4;
  int64 version = 5;
  string updated_by = 6;
  int64 updated_at_unix = 7;
}

enum ClipboardItemType {
  CLIPBOARD_ITEM_TYPE_UNSPECIFIED = 0;
  CLIPBOARD_ITEM_TYPE_TEXT = 1;
  CLIPBOARD_ITEM_TYPE_IMAGE = 2;
  CLIPBOARD_ITEM_TYPE_FILE = 3;
}

message ClipboardItem {
  string item_id = 1;
  ClipboardItemType type = 2;
  int64 size_bytes = 3;
  string mime = 4;
  string cipher_ref = 5;
  bytes ciphertext = 6;
  bytes nonce = 7;
  int64 created_at_unix = 8;
  string source_device_id = 9;
}

message RegisterDeviceRequest {
  string device_name = 1;
  string platform = 2;
  string pubkey = 3;
  string group_id = 4;
  string recovery_phrase = 5;
}

message RegisterDeviceResponse {
  Device device = 1;
  string group_id = 2;
  string recovery_phrase = 3;
  bool created_new_group = 4;
  string sealed_group_key = 5;
}

message ListDevicesRequest {
  string device_id = 1;
}

message ListDevicesResponse {
  repeated Device devices = 1;
}

message RenameDeviceRequest {
  string device_id = 1;
  string new_name = 2;
}

message RenameDeviceResponse {
  Device device = 1;
}

message RemoveDeviceRequest {
  string request_device_id = 1;
  string target_device_id = 2;
}

message RemoveDeviceResponse {
  bool removed = 1;
}

message RecoverGroupRequest {
  string recovery_phrase = 1;
  string device_name = 2;
  string platform = 3;
  string pubkey = 4;
}

message RecoverGroupResponse {
  Device device = 1;
  string group_id = 2;
  string sealed_group_key = 3;
}

message CreateBindCodeRequest {
  string device_id = 1;
}

message CreateBindCodeResponse {
  string code = 1;
  int64 expires_at_unix = 2;
  int32 attempts_left = 3;
}

message RequestBindRequest {
  string code = 1;
  string requester_device_id = 2;
}

message RequestBindResponse {
  string request_id = 1;
  Device issuer_device = 2;
  int64 expires_at_unix = 3;
}

message ConfirmBindRequest {
  string request_id = 1;
  string issuer_device_id = 2;
  bool approve = 3;
}

message ConfirmBindResponse {
  bool approved = 1;
  string group_id = 2;
  string sealed_group_key = 3;
}

message GetPolicyRequest {
  string device_id = 1;
}

message GetPolicyResponse {
  Policy policy = 1;
}

message UpdatePolicyRequest {
  string device_id = 1;
  int64 expected_version = 2;
  bool allow_text = 3;
  bool allow_image = 4;
  bool allow_file = 5;
  int64 max_file_size_bytes = 6;
}

message UpdatePolicyResponse {
  Policy policy = 1;
}

message EventStreamClientMessage {
  oneof payload {
    EventStreamHello hello = 1;
    EventStreamAck ack = 2;
  }
}

message EventStreamServerMessage {
  oneof payload {
    EventStreamConnected connected = 1;
    EventStreamClipboard clipboard = 2;
    EventStreamPairingRequest pairing_request = 3;
  }
}

message EventStreamHello {
  string device_id = 1;
  string lan_addr = 2;
}

message EventStreamConnected {
  int64 now_unix = 1;
}

message EventStreamClipboard {
  ClipboardItem item = 1;
  repeated string preferred_lan_targets = 2;
}

message EventStreamPairingRequest {
  string request_id = 1;
  string requester_device_id = 2;
  string requester_name = 3;
  string requester_platform = 4;
  int64 requested_at_unix = 5;
  int64 expires_at_unix = 6;
}

message EventStreamAck {
  string item_id = 1;
}

message PushClipboardItemRequest {
  string device_id = 1;
  ClipboardItem item = 2;
}

message PushClipboardItemResponse {
  bool accepted = 1;
}

message AckItemRequest {
  string device_id = 1;
  string item_id = 2;
}

message AckItemResponse {
  bool acknowledged = 1;
}

message FetchOfflineRequest {
  string device_id = 1;
  int32 limit = 2;
}

message FetchOfflineResponse {
  repeated ClipboardItem items = 1;
}
