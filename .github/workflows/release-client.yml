name: release-client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-client:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native macOS desktop binary
        run: swift build --package-path apps/desktop-macos -c release

      - name: Pack release artifact
        run: |
          mkdir -p release-assets
          cp apps/desktop-macos/.build/release/sharepaste-desktop release-assets/sharepaste-desktop
          tar -czf release-assets/sharepaste-desktop-macos.tar.gz -C release-assets sharepaste-desktop

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            release-assets/sharepaste-desktop-macos.tar.gz
          if-no-files-found: error

  publish-release:
    needs: build-macos-client
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SharePaste ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.
            Artifacts are built from the tagged commit.
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.tar.gz
